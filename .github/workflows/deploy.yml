name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master # Change this if your default branch is named 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can change this to 22 if you are using Node 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js and OpenNext
        run: |
          npm run build
          npx @opennextjs/cloudflare build
        env:
          DATABASE_URL: "file:./dev.db"
          R2_BUCKET_NAME: "placement-assets"
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_PUBLIC_URL: "https://pub-1b5e6b5b4fbe4c89940f9bb74b08fa75.r2.dev"
          R2_END_POINT: "https://f1367f64dbf752b13589fe0e999e885b.r2.cloudflarestorage.com"
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_FROM: "ankit@ankitdevprojects.qzz.io"
          NODE_VERSION: "20"
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GMAIL_USER: "ankit.education86@gmail.com"
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ADMIN_EMAIL: "admin@rgi.ac.in"
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          DOMAIN_NAME: "ankit-dev.me"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
